app:
  name: "rag-qa-service"
  host: "0.0.0.0"
  port: 8000

embedding:
  model_name: "sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2"
  dimension: 384

llm:
  model_name: "qwen-max-latest"
  temperature: 0.1
  max_tokens: 1024
  api_key: "sk-9090ef112cab4d41ba5690532012d8db"
  api_base: "https://dashscope.aliyuncs.com/compatible-mode/v1"

retrieval:
  mode: "hybrid"
  top_k: 5
  hybrid_alpha: 0.5
  reranker:
    enabled: false
    model_name: "cross-encoder/ms-marco-MiniLM-L-6-v2"
    top_n: 3

chunking:
  parent_chunk_size: 1500
  parent_chunk_overlap: 200
  child_chunk_size: 300
  child_chunk_overlap: 50

safety:
  pii_redaction_enabled: false
  prompt_injection_defense: true
  low_confidence_threshold: 0.3
  refusal_message: "抱歉，我无法回答这个问题。请尝试联系相关部门获取更多信息。"

cache:
  enabled: true
  backend: "memory"
  redis_url: "redis://localhost:6379/0"
  ttl_seconds: 3600

logging:
  level: "INFO"
  format: "json"
  output_dir: "logs"

evaluation:
  sample_size: 50
  faithfulness_threshold: 0.85
  context_precision_threshold: 0.70
  answer_compliance_threshold: 0.80
  style_consistency_threshold: 0.80
  refusal_appropriateness_threshold: 0.80
