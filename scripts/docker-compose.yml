version: '3.8'

services:
  # MinIO 对象存储服务
  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    ports:
      - "9000:9000"   # API 端口
      - "9001:9001"   # Web 控制台端口
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: admin123456
    volumes:
      # Windows 路径请修改为你的实际路径
      - D:/aia-rag/minio/data:/data
    command: server /data --console-address ":9001"
    networks:
      - app-network

  # MySQL 8 数据库服务
  mysql8:
    image: mysql:8.0
    container_name: mysql8
    restart: unless-stopped
    ports:
      - "3306:3306"   # MySQL 默认端口
    environment:
      MYSQL_ROOT_PASSWORD: know_engine
      MYSQL_DATABASE: know_engine
      MYSQL_USER: know_engine
      MYSQL_PASSWORD: know_engine
    volumes:
      # Windows 路径请修改为你的实际路径
      - D:/aia-rag/mysql/data:/var/lib/mysql
      # 可选的初始化脚本文件夹
      - D:/aia-rag/mysql/init/tables.sql:/docker-entrypoint-initdb.d/tables.sql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    networks:
      - app-network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5

  xxl-job-admin:
    image: xuxueli/xxl-job-admin:2.4.2    # 官方推荐镜像[citation:5][citation:10]
    container_name: xxl-job-admin
    restart: always
    depends_on:
      mysql8:
        condition: service_healthy      # 等待 MySQL 完全启动
    environment:
      # 使用 PARAMS 传递 Java 启动参数，官方标准写法[citation:5][citation:10]
      - PARAMS=--spring.datasource.url=jdbc:mysql8://mysql:3306/xxl_job?useUnicode=true&characterEncoding=UTF-8&autoReconnect=true&serverTimezone=Asia/Shanghai
        --spring.datasource.username=know_engine
        --spring.datasource.password=know_engine
        --xxl.job.accessToken=default_token   # 执行器注册时需要这个 token
    ports:
      - "8080:8080"                     # 将调度中心 Web 界面映射到宿主机 8080 端口
    volumes:
      - ./data/xxl-job/logs:/data/applogs   # 持久化调度日志

  redis:
    image: redis:latest
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"   # Redis 默认端口
    environment:
      # 可选：设置 Redis 密码（推荐生产环境设置）
      - REDIS_PASSWORD=know_engine
    volumes:
      # Windows 路径请修改为你的实际路径
      - D:/aia-rag/redis/data:/data
      # 可选的配置文件挂载
      - D:/aia-rag/redis/redis.conf:/usr/local/etc/redis/redis.conf
    command: >
      redis-server 
      --requirepass know_engine
      --appendonly yes
      --appendfsync everysec
      --save 900 1
      --save 300 10
      --save 60 10000
    networks:
      - app-network
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.2
    container_name: elasticsearch
    restart: unless-stopped
    ports:
      - "9200:9200"   # HTTP API
      - "9300:9300"   # 集群内部通信
    environment:
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - xpack.security.enabled=false   # 开发环境关闭安全认证（方便测试）
      - network.host=0.0.0.0
    volumes:
      - D:/aia-rag/elasticsearch/data:/usr/share/elasticsearch/data
      - D:/aia-rag/elasticsearch/config:/usr/share/elasticsearch/config
    networks:
      - app-network

  neo4j:
    image: neo4j:5.26.0
    container_name: neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"   # HTTP Browser
      - "7687:7687"   # Bolt 协议（驱动连接）
    environment:
      - NEO4J_AUTH=neo4j/neo4j666
      - 'NEO4J_PLUGINS=["apoc"]'   # 可选插件
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*
    volumes:
      - D:/aia-rag/neo4j/data:/data
      - D:/aia-rag/neo4j/logs:/logs
      - D:/aia-rag/neo4j/plugins:/plugins
    networks:
      - app-network

# 自定义网络，让两个容器可以互相访问
networks:
  app-network:
    driver: bridge